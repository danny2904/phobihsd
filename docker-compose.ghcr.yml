services:
  phobihsd:
    image: ghcr.io/danny2904/phobihsd:cpu-latest
    container_name: phobihsd
    environment:
      PHOBIHSD_DEVICE: cpu
      PHOBIHSD_HOST: 0.0.0.0
      PHOBIHSD_PORT: 7860
      PHOBIHSD_CONFIG: config/experiments/model_comparison.yaml
      PHOBIHSD_PROPOSED_CKPT: models/phobihsd_proposed.safetensors
      PHOBIHSD_HF_REPO: joshswift/phobihsd-proposed
    ports:
      - "7860:7860"
