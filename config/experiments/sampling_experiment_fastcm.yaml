seed: 4

dataset:
  train_csv: data/raw/train.csv
  dev_csv: data/raw/dev.csv
  test_csv: data/raw/test.csv

preprocess:
  lowercase: false

features:
  max_features: 12000
  min_df: 2
  use_svd: true
  svd_components: 128

model:
  model_name: vinai/phobert-base-v2
  text_source: raw_text
  freeze_encoder: true
  head_type: cls_mlp
  max_len: 80
  hidden_dim: 256
  dropout: 0.5
  batch_size: 32
  epochs: 1
  encoder_lr: 1.0e-5
  head_lr: 3.0e-5
  llrd: 0.9
  warmup_ratio: 0.1
  weight_decay: 0.01
  grad_clip: 1.0
  loss_type: class_weight
  early_stopping_patience: 1
  threshold_grid: [0.5]

outputs:
  sampling_table_csv: results/tables/table_4_6_sampling_impact_fastcm.csv
  metrics_json: results/metrics/sampling_table_4_6_fastcm.json
  log_txt: results/logs/table_4_6_sampling_fastcm.log
  confusion_matrix_png: results/figures/confusion_matrix_table_4_6_fastcm.png
  confusion_matrix_dir: results/figures/sampling_methods_fastcm
  registry_csv: experiments/registry.csv
