    columns:
      - key: Rank
        label: Rank
      - key: Method
        label: Method
      - key: Precision
        label: Precision
        fmt: "{:.4f}"
      - key: Recall
        label: Recall
        fmt: "{:.4f}"
      - key: Macro F1
        label: Macro F1
        fmt: "{:.4f}"
      - key: Accuracy
        label: Accuracy
        fmt: "{:.4f}"
